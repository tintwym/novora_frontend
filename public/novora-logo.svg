      <stop offset="38%" stop-color="#3FA8D6"/>
      <stop offset="72%" stop-color="#8BCF43"/>
      <stop offset="100%" stop-color="#6FBF2E"/>
    </linearGradient>
    <linearGradient id="ribbon-orange" x1="44" y1="8" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDB515"/>
